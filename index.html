<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: antiquewhite; color: black; font-size: 20px; justify-content: center; align-items: center;">
    <h1 style="padding-left:650px; ;">Quiz Form</h1>
    <div id="parent" style="width: 1000px; height: 1255px; background-color:beige;border:2px solid rgb(248, 168, 47); margin-left: 250px; border-radius: 15px;">
        <form action="" id="form" style="margin: 50px;">
             <label for="q1">1. Which planet is known as the Red Planet?</label>
             <br><br>
             <input type="radio" name="q1" id="q1A" value="Venus">
             <label for="q1A">(A) Venus</label>
             <br><br>
             <input type="radio" name="q1" id="q1B" value="Jupiter">
             <label for="q1B">(B) Jupiter</label>
             <br><br>
             <input type="radio" name="q1" id="q1C" value="Saturn">
             <label for="q1C">(C) Saturn</label>
             <br><br>
             <input type="radio" name="q1" id="q1D" value="Mars">
             <label for="q1D">(D) Mars</label>
             <br><br>

             <label for="q2">2. What is the largest ocean on Earth?</label>
             <br><br>
             <input type="radio" name="q2" id="q2A" value="Indian Ocean">
             <label for="q2A">(A) Indian Ocean</label>
             <br><br>
             <input type="radio" name="q2" id="q2B" value="Arctic Ocean">
             <label for="q2B">(B) Arctic Ocean</label>
             <br><br>
             <input type="radio" name="q2" id="q2C" value="Pacific Ocean">
             <label for="q2C">(C) Pacific Ocean</label>
             <br><br>
             <input type="radio" name="q2" id="q2D" value="Atlantic Ocean">
             <label for="q2D">(D) Atlantic Ocean</label>
             <br><br>

             <label for="q3">3. What is the chemical symbol for Gold?</label>
             <br><br>
             <input type="radio" name="q3" id="q3A" value="Ag">
             <label for="q3A">(A) Ag</label>
             <br><br>
             <input type="radio" name="q3" id="q3B" value="Au">
             <label for="q3B">(B) Au</label>
             <br><br>
             <input type="radio" name="q3" id="q3C" value="Gd">
             <label for="q3C">(C) Gd</label>
             <br><br>
             <input type="radio" name="q3" id="q3D" value="Go">
             <label for="q3D">(D) Go</label>
             <br><br>
             <label for="q4">4. Which country is home to the Great Wall?</label>
             <br><br>
             <input type="radio" name="q4" id="q4A" value="India">
             <label for="q4A">(A) India</label>
             <br><br>
             <input type="radio" name="q4" id="q4B" value="Japan">
             <label for="q4B">(B) Japan</label>
             <br><br>
             <input type="radio" name="q4" id="q4C" value="Mongolia">
             <label for="q4C">(C) Mongolia</label>
             <br><br>
             <input type="radio" name="q4" id="q4D" value="China">
             <label for="q4D">(D) China</label>
             <br><br>
             <label for="q5">5. Who developed the theory of relativity?</label>
             <br><br>
             <input type="radio" name="q5" id="q5A" value="Isaac Newton">
             <label for="q5A">(A) Isaac Newton</label>
             <br><br>
             <input type="radio" name="q5" id="q5B" value="Galileo Galilei">
             <label for="q5B">(B) Galileo Galilei</label>
             <br><br>
             <input type="radio" name="q5" id="q5C" value="Albert Einstein">
             <label for="q5C">(C) Albert Einstein</label>
             <br><br>
             <input type="radio" name="q5" id="q5D" value="Nikola Tesla">
             <label for="q5D">(D) Nikola Tesla</label>
             <br><br><br>
             <button type="submit" style="width: 80px; height: 30px; border: 2px solid green; background-color:green; font-size: 17px; border-radius: 7px; margin-left: 30px;">Submit</button>
             <button type="reset" style="width: 80px; height: 30px; border: 2px solid red; background-color:red; font-size: 17px; border-radius: 7px; margin-left: 680px;">Reset</button>
        </form>
    </div>
     <br><br>
    <div id="result"></div>
    
</body>
<script src="./app.js"></script>
</html>
